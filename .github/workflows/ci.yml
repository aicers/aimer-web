name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Change Filter
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.decide.outputs.docs_only }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6

      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - "docs/**"
              - "**/*.md"
              - "mkdocs.yml"
              - ".markdownlint*"
            code:
              - "src/**"
              - "e2e/**"
              - "migrations/**"
              - "scripts/**"
              - "infra/**"
              - "public/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "tsconfig*.json"
              - "next.config.*"
              - "biome.json"
              - "Dockerfile*"
              - "docker-compose.yml"
              - ".github/workflows/**"

      - name: Decide Docs-Only
        id: decide
        run: |
          if [ "${{ steps.filter.outputs.docs }}" = "true" ] && [ "${{ steps.filter.outputs.code }}" != "true" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  docs-build:
    name: Docs Build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: python3 -m pip install --upgrade pip mkdocs-material mkdocs-static-i18n

      - name: Build
        run: mkdocs build --strict

  # Downstream check/build/test jobs for code changes will be added
  # by #26 (CI & Dependabot).  They should use:
  #   needs: changes
  #   if: needs.changes.outputs.docs_only != 'true'
  # so that docs-only PRs skip code validation.
