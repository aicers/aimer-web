name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Change Filter
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.decide.outputs.docs_only }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6

      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docs:
              - "docs/**"
              - "**/*.md"
              - "mkdocs.yml"
              - ".markdownlint*"
            code:
              - "src/**"
              - "e2e/**"
              - "migrations/**"
              - "scripts/**"
              - "infra/**"
              - "public/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "tsconfig*.json"
              - "next.config.*"
              - "biome.json"
              - "Dockerfile*"
              - "docker-compose.yml"
              - ".github/workflows/**"

      - name: Decide Docs-Only
        id: decide
        run: |
          if [ "${{ steps.filter.outputs.docs }}" = "true" ] && [ "${{ steps.filter.outputs.code }}" != "true" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23

  docs-build:
    name: Docs Build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: python3 -m pip install --upgrade pip mkdocs-material mkdocs-static-i18n

      - name: Build
        run: mkdocs build --strict

  check:
    name: Check
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enable corepack
        run: corepack enable pnpm
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: biomejs/setup-biome@v2
        with:
          version: latest
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm graphql:check
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  nginx-config:
    name: Nginx Config
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate dummy TLS certs
        run: |
          mkdir -p infra/certs
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout infra/certs/localhost-key.pem \
            -out infra/certs/localhost.pem \
            -days 1 -subj '/CN=localhost'
      - name: Validate dev config
        run: |
          docker run --rm \
            -v "$PWD/infra/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$PWD/infra/certs:/etc/nginx/certs:ro" \
            nginx:alpine nginx -t
      - name: Validate prod config
        run: |
          docker run --rm \
            -v "$PWD/infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$PWD/infra/certs:/etc/nginx/certs:ro" \
            nginx:alpine nginx -t

  unit:
    name: Unit Test
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enable corepack
        run: corepack enable pnpm
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  db:
    name: DB Test
    needs: check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-trixie
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Create databases and roles
        run: psql "postgres://postgres:postgres@localhost:5432/auth_db" -f infra/postgres/init-databases.sql
      - name: Enable corepack
        run: corepack enable pnpm
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:db
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/auth_db
          AUDIT_DATABASE_URL: postgres://postgres:postgres@localhost:5432/audit_db

  e2e:
    name: E2E
    needs: check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-trixie
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      openbao:
        image: openbao/openbao:latest
        env:
          BAO_DEV_ROOT_TOKEN_ID: e2e-root-token
          BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
        ports:
          - 8200:8200
        options: >-
          --health-cmd "wget -q --spider http://127.0.0.1:8200/v1/sys/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      # Keycloak service will be added when e2e tests require it.
    steps:
      - uses: actions/checkout@v6
      - name: Create databases and roles
        run: psql "postgres://postgres:postgres@localhost:5432/auth_db" -f infra/postgres/init-databases.sql
      - name: Configure OpenBao Transit
        run: |
          curl -sf -X POST http://localhost:8200/v1/sys/mounts/transit \
            -H "X-Vault-Token: e2e-root-token" \
            -d '{"type": "transit"}'
          curl -sf -X POST http://localhost:8200/v1/transit/keys/staging-events \
            -H "X-Vault-Token: e2e-root-token"
      - name: Enable corepack
        run: corepack enable pnpm
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e
        env:
          CI: "true"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/auth_db
          DATABASE_MIGRATION_URL: postgres://postgres:postgres@localhost:5432/auth_db
          AUDIT_DATABASE_URL: postgres://postgres:postgres@localhost:5432/audit_db
          CUSTOMER_DATABASE_OWNER_URL: postgres://postgres:postgres@localhost:5432/auth_db
          CUSTOMER_DATABASE_URL: postgres://postgres:postgres@localhost:5432/auth_db
          CSRF_SECRET: e2e-test-csrf-secret
          BAO_ADDR: http://localhost:8200
          BAO_TOKEN: e2e-root-token
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  image-build:
    name: Image Build
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
