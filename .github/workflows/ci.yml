name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Change Filter
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.decide.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6

      - name: Filter Paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - "docs/**"
              - "**/*.md"
              - "mkdocs.yml"
              - ".markdownlint*"
            code:
              - "src/**"
              - "e2e/**"
              - "migrations/**"
              - "scripts/**"
              - "infra/**"
              - "public/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "tsconfig*.json"
              - "next.config.*"
              - "biome.json"
              - "Dockerfile*"
              - "docker-compose.yml"
              - ".github/workflows/**"

      - name: Decide Docs-Only
        id: decide
        run: |
          if [ "${{ steps.filter.outputs.docs }}" = "true" ] && [ "${{ steps.filter.outputs.code }}" != "true" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi
