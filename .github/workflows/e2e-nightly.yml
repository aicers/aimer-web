name: E2E Nightly (Tier-2)

# Full-flow analyst invitation E2E (#452): real Keycloak OIDC + real Mailpit
# email link. These specs are tagged @tier2 and are NEVER run in the per-PR
# pipeline (ci.yml). They run here against a full stack on a nightly schedule.
#
# Schedule: KST midnight. GitHub cron is UTC, so 15:15 UTC ≈ 00:15 KST.
# The job only proceeds when `main` received commits during the previous KST
# calendar day (the day that just ended) — a manual workflow_dispatch always
# runs and is the intended way to validate changes to this workflow.

on:
  schedule:
    - cron: "15 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gate:
    name: Gate (KST same-day changes)
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: gate
        name: Decide whether to run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — running unconditionally."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Count commits on main during the previous KST calendar day.
          export TZ=Asia/Seoul
          END="$(date +%Y-%m-%d) 00:00:00"
          START="$(date -d 'yesterday' +%Y-%m-%d) 00:00:00"
          COUNT="$(git log --since="$START" --until="$END" --oneline origin/main | wc -l | tr -d ' ')"
          echo "KST window: $START .. $END (commits=$COUNT)"
          if [ "$COUNT" -gt 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "main had no commits that KST day — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-tier2:
    name: E2E Tier-2
    needs: gate
    if: ${{ needs.gate.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    env:
      E2E_USER_PASSWORD: e2e-Passw0rd!
    services:
      postgres:
        image: postgres:18-trixie
        env:
          POSTGRES_DB: auth_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      openbao:
        image: openbao/openbao:latest
        env:
          BAO_DEV_ROOT_TOKEN_ID: e2e-root-token
          BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
        ports:
          - 8200:8200
        options: >-
          --health-cmd "wget -q --spider http://127.0.0.1:8200/v1/sys/health || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
        options: >-
          --health-cmd "wget -q --spider http://localhost:8025/api/v1/info || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Create databases and roles
        run: psql "postgres://postgres:postgres@localhost:5432/auth_db" -f infra/postgres/init-databases.sql

      - name: Configure OpenBao Transit
        run: |
          curl -sf -X POST http://localhost:8200/v1/sys/mounts/transit \
            -H "X-Vault-Token: e2e-root-token" \
            -d '{"type": "transit"}'
          curl -sf -X POST http://localhost:8200/v1/transit/keys/staging-events \
            -H "X-Vault-Token: e2e-root-token"

      # Keycloak runs as a docker step (not a service container) so it can mount
      # the realm export from the checked-out workspace — service containers
      # start before checkout and cannot see repo files.
      - name: Start Keycloak
        run: |
          docker run -d --name keycloak \
            -p 8080:8080 \
            -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
            -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
            -v "${{ github.workspace }}/infra/keycloak/realm-export.json:/opt/keycloak/data/import/aimer-realm.json:ro" \
            -v "${{ github.workspace }}/infra/keycloak/themes/aimer:/opt/keycloak/themes/aimer:ro" \
            quay.io/keycloak/keycloak:26.0 \
            start-dev --import-realm

      - name: Wait for Keycloak
        run: |
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:8080/realms/aimer/.well-known/openid-configuration >/dev/null; then
              echo "Keycloak ready"
              exit 0
            fi
            sleep 5
          done
          echo "Keycloak did not become ready" >&2
          docker logs keycloak || true
          exit 1

      - name: Seed Keycloak test users
        run: bash infra/keycloak/seed-test-users.sh
        env:
          KEYCLOAK_URL: http://localhost:8080
          KEYCLOAK_REALM: aimer
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin

      - name: Enable corepack
        run: corepack enable pnpm
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps

      - name: Run Tier-2 E2E
        run: pnpm test:e2e:tier2
        env:
          CI: "true"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/auth_db
          DATABASE_MIGRATION_URL: postgres://postgres:postgres@localhost:5432/auth_db
          AUDIT_DATABASE_URL: postgres://postgres:postgres@localhost:5432/audit_db
          CUSTOMER_DATABASE_OWNER_URL: postgres://postgres:postgres@localhost:5432/auth_db
          CUSTOMER_DATABASE_URL: postgres://postgres:postgres@localhost:5432/auth_db
          CSRF_SECRET: e2e-test-csrf-secret
          BAO_ADDR: http://localhost:8200
          BAO_TOKEN: e2e-root-token
          KEYCLOAK_URL: http://localhost:8080
          KEYCLOAK_REALM: aimer
          OIDC_GENERAL_CLIENT_ID: aimer-web
          OIDC_GENERAL_CLIENT_SECRET: changeme-general-secret
          SMTP_HOST: localhost
          SMTP_PORT: "1025"
          EMAIL_FROM: e2e@aimer-web.test
          MAILPIT_API_URL: http://localhost:8025
          BASE_URL: http://localhost:3000

      - name: Dump Keycloak logs on failure
        if: ${{ failure() }}
        run: docker logs keycloak || true

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-tier2
          path: e2e/playwright-report/
          retention-days: 7
