resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Next.js application (host.docker.internal for local dev)
    location / {
        set $nextjs http://host.docker.internal:3000;
        proxy_pass $nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keycloak auth endpoints
    location /auth/ {
        # Strip the /auth prefix before proxying. The variable-form
        # proxy_pass below cannot perform the location-prefix replacement
        # that the literal form does, so we rewrite explicitly. The
        # variable form is retained so nginx defers DNS resolution of
        # keycloak to request time via the resolver directive.
        rewrite ^/auth(/.*)$ $1 break;
        set $keycloak http://keycloak:8080;
        proxy_pass $keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
