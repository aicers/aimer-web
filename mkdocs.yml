site_name: Clumit Insight Manual
site_description: Clumit Insight user manual
repo_url: https://github.com/aicers/aimer-web
site_url: https://example.invalid/aimer-web

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.tracking
    - search.highlight
    - search.suggest

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          build: true
          default: true
          nav:
            - Overview: index.md
            - Getting Started: getting-started.md
            - Configuration: configuration.md
            - Usage: usage.md
            - Analysis Result: analysis-result.md
            - Customer Hub: analysis/customer-hub.md
            - Story Analysis: analysis/story.md
            - Threat Stories: analysis/threat-stories.md
            - Suspicious Events: analysis/suspicious-events.md
            - Periodic Security Reports: analysis/reports.md
            - Authentication: authentication.md
            - Navigation: navigation.md
            - Cross-Customer Overview: cross-customer-overview.md
            - Account Preferences: account-preferences.md
            - Members: members.md
            - Account Management: account-management.md
            - Admin Designation: admin-designation.md
            - Customer Management: customer-management.md
            - Cross-System Customer Identification: cross-system-customer-identification.md
            - Environment Management: environment-management.md
            - Audit Logs: audit-logs.md
            - Backup & Restore: backup-restore.md
            - Phase 2 Ingest: operations/phase2-ingest.md
            - mTLS: operations/mtls.md
            - Retention Sweeper: operations/retention-sweeper.md
            - Analysis Worker: operations/analysis-worker.md
        - locale: ko
          name: 한국어
          build: true
          nav:
            - Overview: index.md
            - Getting Started: getting-started.md
            - Configuration: configuration.md
            - Usage: usage.md
            - Analysis Result: analysis-result.md
            - Customer Hub: analysis/customer-hub.md
            - Story Analysis: analysis/story.md
            - Threat Stories: analysis/threat-stories.md
            - Suspicious Events: analysis/suspicious-events.md
            - Periodic Security Reports: analysis/reports.md
            - Authentication: authentication.md
            - Navigation: navigation.md
            - Cross-Customer Overview: cross-customer-overview.md
            - Account Preferences: account-preferences.md
            - Members: members.md
            - Account Management: account-management.md
            - Admin Designation: admin-designation.md
            - Customer Management: customer-management.md
            - Cross-System Customer Identification: cross-system-customer-identification.md
            - Environment Management: environment-management.md
            - Audit Logs: audit-logs.md
            - Backup & Restore: backup-restore.md
            - Phase 2 Ingest: operations/phase2-ingest.md
            - mTLS: operations/mtls.md
            - Retention Sweeper: operations/retention-sweeper.md
            - Analysis Worker: operations/analysis-worker.md
          nav_translations:
            Overview: 개요
            Getting Started: 시작하기
            Configuration: 설정
            Usage: 사용법
            Analysis Result: 분석 결과
            Customer Hub: 고객 허브
            Story Analysis: 스토리 분석
            Threat Stories: 위협 스토리
            Suspicious Events: 의심 이벤트
            Periodic Security Reports: 주기 보안 리포트
            Authentication: 인증
            Navigation: 내비게이션
            Cross-Customer Overview: 고객 통합 개요
            Account Preferences: 계정 환경설정
            Members: 멤버
            Account Management: 계정 관리
            Admin Designation: 관리자 지정
            Customer Management: 고객 관리
            Cross-System Customer Identification: 시스템 간 고객 식별
            Environment Management: 환경 관리
            Audit Logs: 감사 로그
            Backup & Restore: 백업 및 복원
            Phase 2 Ingest: Phase 2 수집
            Retention Sweeper: 보존 스위퍼
            Analysis Worker: 분석 워커

extra_css:
  - styles/lists.css
  - styles/pdf.css
