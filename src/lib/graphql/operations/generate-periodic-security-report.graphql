mutation PeriodicReport(
  $customerId: ID!
  $period: PeriodType!
  $date: String!
  $timezone: String!
  $name: String!
  $model: String!
  $lang: Language
  $inputs: PeriodicReportInput!
) {
  generatePeriodicSecurityReport(
    customerId: $customerId
    period: $period
    date: $date
    timezone: $timezone
    name: $name
    model: $model
    lang: $lang
    inputs: $inputs
  ) {
    executiveSummary
    storyHighlights
    baselineDrift
    notableEvents
    recommendations
    promptVersion
    modelActualVersion
  }
}
