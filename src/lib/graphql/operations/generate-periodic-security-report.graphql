mutation PeriodicReport(
  $customerId: ID!
  $period: Period!
  $date: String!
  $timezone: String!
  $name: String!
  $model: String!
  $lang: Language
  $inputs: PeriodicReportInputs!
) {
  generatePeriodicSecurityReport(
    customerId: $customerId
    period: $period
    date: $date
    timezone: $timezone
    name: $name
    model: $model
    lang: $lang
    inputs: $inputs
  ) {
    sections
    promptVersion
    modelActualVersion
  }
}
