mutation AnalyzeEvent(
  $event: String!
  $eventTime: DateTime!
  $name: String!
  $model: String!
  $lang: Language
) {
  analyzeEvent(
    event: $event
    eventTime: $eventTime
    name: $name
    model: $model
    lang: $lang
  ) {
    severityScore
    likelihoodScore
    severityFactors
    likelihoodFactors
    ttpTags
    analysis
    promptVersion
    modelActualVersion
  }
}
