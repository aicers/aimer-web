services:
  postgres:
    image: postgres:18-trixie
    profiles: [dev, prod]
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  openbao:
    image: openbao/openbao:latest
    profiles: [dev]
    cap_add:
      - IPC_LOCK
    environment:
      BAO_ADDR: "http://127.0.0.1:8200"
    ports:
      - "8200:8200"
    volumes:
      - ./infra/openbao/config.hcl:/bao/config/config.hcl:ro
      - ./infra/openbao/init-transit.sh:/usr/local/bin/init-transit.sh:ro
      - bao-data:/bao/data
      - bao-init:/bao/init
    entrypoint: /bin/sh
    command:
      - -c
      - |
        bao server -config=/bao/config/config.hcl &
        BAO_PID=$$!
        /usr/local/bin/init-transit.sh
        wait $$BAO_PID
    healthcheck:
      test: ["CMD-SHELL", "BAO_ADDR=http://127.0.0.1:8200 bao status"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles: [dev]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/aimer-realm.json:ro
      - ./infra/keycloak/themes/aimer:/opt/keycloak/themes/aimer:ro
    command: start-dev --import-realm --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  keycloak-prod:
    image: quay.io/keycloak/keycloak:26.0
    profiles: [prod]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-changeme}
      KC_HOSTNAME: ${KC_HOSTNAME:?KC_HOSTNAME is required for the prod profile — set it to the canonical public URL with scheme, e.g. https://aimer-web.example.com}
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HTTP_RELATIVE_PATH: ${KC_HTTP_RELATIVE_PATH:-/}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/aimer-realm.json:ro
      - ./infra/keycloak/themes/aimer:/opt/keycloak/themes/aimer:ro
    command: start --import-realm --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          path="$${KC_HTTP_RELATIVE_PATH%/}"
          exec 3<>/dev/tcp/localhost/8080 || exit 1
          printf 'GET %s/realms/master/.well-known/openid-configuration HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' "$$path" >&3
          head -1 <&3 | grep -q 200
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    profiles: [dev]
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx-dev:
    image: nginx:alpine
    profiles: [dev]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy

  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [prod]
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - next-app-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  nginx-prod:
    image: nginx:alpine
    profiles: [prod]
    ports:
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs:/etc/nginx/certs:ro
    depends_on:
      next-app:
        condition: service_started
      keycloak-prod:
        condition: service_healthy

volumes:
  pgdata:
  bao-data:
  bao-init:
  next-app-data:
