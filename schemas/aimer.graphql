"""
auth-jwt is on removal track per #358; the new severity/likelihood fields are
exposed only under auth-mtls. Both LLM contract paths converge once auth-jwt
is deleted.
"""
type AnalysisResult {
	"""
	Severity score from 0.0 to 1.0 ("if real, how bad")
	"""
	severityScore: Float!
	"""
	Likelihood score from 0.0 to 1.0 ("how likely this is a real threat")
	"""
	likelihoodScore: Float!
	"""
	Short noun phrases articulating the severity score (1-5 items).
	The sentinel `["insufficient evidence"]` indicates thin input.
	"""
	severityFactors: [String!]!
	"""
	Short noun phrases articulating the likelihood score (1-5 items).
	The sentinel `["insufficient evidence"]` indicates thin input.
	"""
	likelihoodFactors: [String!]!
	"""
	MITRE ATT&CK technique IDs (e.g., `T1078`, `T1110.001`). May be empty.
	"""
	ttpTags: [String!]!
	"""
	Markdown-formatted analysis
	"""
	analysis: String!
}

type ChatChoice {
	message: OpenAiChatMessage!
	index: Int!
	finishReason: String
}

scalar DateTime

"""
Round-11 `StoryAnalysisResult` wire shape. Exposed only under
auth-mtls; the BFF (aimer-web) supplies pre-redacted story member
events with story-scope tokens (`<<REDACTED_*_E{i}_*>>`) and persists
the result on its own side, so aimer never caches a story analysis.

Scores carry the `[0.0, 1.0]` shape per RFC 0002 §"LLM contract" —
aimer-side clamped before reply. Both factor arrays are ordered most
impactful first; the sentinel `["insufficient evidence"]` indicates
genuinely thin input.
"""
type StoryAnalysisResult {
	"""
	Severity score from 0.0 to 1.0 ("if real, how bad").
	"""
	severityScore: Float!
	"""
	Likelihood score from 0.0 to 1.0 ("how likely this is a real threat").
	"""
	likelihoodScore: Float!
	"""
	Short noun phrases articulating the severity score (1-5 items).
	Ordered most impactful first. The sentinel
	`["insufficient evidence"]` indicates thin input.
	"""
	severityFactors: [String!]!
	"""
	Short noun phrases articulating the likelihood score (1-5 items).
	Ordered most impactful first. The sentinel
	`["insufficient evidence"]` indicates thin input.
	"""
	likelihoodFactors: [String!]!
	"""
	MITRE ATT&CK technique IDs (e.g., `T1078`, `T1110.001`). May be empty
	when no clear mapping applies.
	"""
	ttpTags: [String!]!
	"""
	Markdown-formatted analysis narrative. Stored by aimer-web as
	`story_analysis_result.analysis_text`.
	"""
	analysis: String!
	"""
	Prompt template version that produced this result (aimer-side
	`STORY_PROMPT` revision). Stored on the result row as `prompt_version`.
	"""
	promptVersion: String!
	"""
	Model version actually selected by the aimer LLM router for this
	request. May differ from the input `model` when an alias is resolved.
	Stored on the result row as `model_actual_version`.
	"""
	modelActualVersion: String!
}

"""
A single story member event for `analyzeStory`. Supplied by the BFF
(aimer-web) already redacted with story-scope tokens
(`<<REDACTED_*_E{i}_*>>`); aimer forwards the payload to the LLM
unchanged.
"""
input StoryMemberInput {
	"""
	1-based position in the canonical member order. The ordinals form a
	contiguous `1..N` multiset and match the `E{i}` token namespace
	embedded in `event`.
	"""
	ordinal: Int!
	"""
	Member role within the story (e.g. `primary` or `context`). Non-empty.
	"""
	role: String!
	"""
	Per-member event timestamp (UTC).
	"""
	eventTime: DateTime!
	"""
	Pre-redacted member event payload as a JSON-encoded string. Non-empty.
	"""
	event: String!
}

"""
Story-level metadata for `analyzeStory`. aimer validates these values
against the `members` list (`memberCount`, `roleDistribution`) and the
window ordering (`firstSeenAt <= lastSeenAt`).
"""
input StoryMetadataInput {
	"""
	Must equal the top-level `storyId`.
	"""
	storyId: ID!
	"""
	Earliest member event time. Must be `<= lastSeenAt`.
	"""
	firstSeenAt: DateTime!
	"""
	Latest member event time. Must be `>= firstSeenAt`.
	"""
	lastSeenAt: DateTime!
	"""
	Number of members; must equal the `members` list length.
	"""
	memberCount: Int!
	"""
	Per-role frequency; must match the observed `members[].role`
	distribution exactly.
	"""
	roleDistribution: [StoryRoleCountInput!]!
}

"""
A single `(role, count)` entry in `StoryMetadataInput.roleDistribution`.
"""
input StoryRoleCountInput {
	"""
	Role label, matching a `StoryMemberInput.role` value.
	"""
	role: String!
	"""
	Occurrence count for `role`. `>= 0`.
	"""
	count: Int!
}

type GenerateResponse {
	model: String!
	createdAt: String!
	response: String!
	done: Boolean!
	context: [Int!]
	totalDuration: Int
	loadDuration: Int
	promptEvalCount: Int
	promptEvalDuration: Int
	evalCount: Int
	evalDuration: Int
}

enum Language {
	KOREAN
	ENGLISH
}

type Mutation {
	"""
	Analyzes a security event using an LLM and returns the threat analysis.
	
	Stateless variant under `auth-mtls`: the BFF (aicers/aimer-web#44) supplies
	already-redacted events and stores results on its own side, so aimer
	persists nothing here — no cache lookup, no cache write, no in-flight dedup.
	
	PII redaction is the caller's responsibility. aimer-web is the single
	source of truth for the redaction policy and owns the per-event
	redaction map used to restore tokens in the UI; see
	aicers/aimer-web#247. Events arrive already in their final redacted
	form and are forwarded to the LLM unchanged.
	
	# Errors
	
	Returns an error if:
	- Input validation fails (empty `event` or `model`)
	- The requested LLM server `name` is not registered
	- LLM analysis fails
	"""
	analyzeEvent(event: String!, eventTime: DateTime!, name: String!, model: String!, lang: Language): AnalysisResult!
	"""
	Analyzes a multi-event story using an LLM and returns the
	round-11 `StoryAnalysisResult`.

	Stateless under `auth-mtls`: the BFF (aimer-web) supplies the
	already-redacted member events with story-scope token namespacing
	(`<<REDACTED_*_E{i}_*>>`) and persists the result on its own side.
	aimer caches nothing here.

	`members` is a structured list of redacted member events in the
	canonical order; `storyMetadata` carries the story-level window and
	role distribution. aimer validates the structured inputs (contiguous
	`1..N` ordinals, `memberCount`/`roleDistribution` agreement,
	`firstSeenAt <= lastSeenAt`) before forwarding to the LLM.

	# Errors

	Returns an error if:
	- Input validation fails (empty `members` or `model`, or a
	  `storyMetadata`/`members` mismatch)
	- The requested LLM server `name` is not registered
	- LLM analysis fails or response parsing fails
	"""
	analyzeStory(customerId: ID!, storyId: ID!, members: [StoryMemberInput!]!, storyMetadata: StoryMetadataInput!, name: String!, model: String!, lang: Language): StoryAnalysisResult!
	"""
	Generates a report for a given customer.
	
	- The `customer_id` parameter specifies the customer ID for which to generate the report.
	- The `review_hostname` is extracted from the `kid` field of the external REview-signed JWT.
	- The `report_type` parameter specifies the type of report to generate:
	- `DAILY`: Generates a report for the specified date.
	- `WEEKLY`, `MONTHLY`: Aggregates top threats from daily reports within the period.
	Missing daily reports are generated if possible; days with no data are skipped. At least
	one daily report must exist or be creatable for the report generation to succeed.
	- The `date` is for which to generate the report. It is in `YYYY-MM-DD` format. The date is
	interpreted as a date in the "Asia/Seoul" timezone.
	- The `name` parameter specifies the LLM provider/server to use for report generation.
	- The `model` parameter specifies the LLM model to use for report generation.
	- The `lang` parameter, if provided, sets the language for the analysis report (defaults to
	English if not specified).
	- The `force` parameter, if set to `true`, forces re-generation even if a cached result
	exists (defaults to `false` if not specified).
	
	# Errors
	
	Returns an error if:
	- External REview-signed JWT with `kid` is not provided
	- Input validation fails
	- LLM server is not found or unavailable
	- Database operations fail
	- No event analysis data exists for the requested date (`DAILY`) or for any dates in the
	target period (`WEEKLY`/`MONTHLY`)
	- LLM response parsing fails
	"""
	generateReport(customerId: ID!, name: String!, model: String!, reportType: ReportType!, date: String!, lang: Language, force: Boolean): ReportResult!
}

type OllamaChatMessage {
	role: String!
	content: String!
}

input OllamaChatMessageInput {
	role: String!
	content: String!
}

type OllamaChatResponse {
	model: String!
	createdAt: String!
	message: OllamaChatMessage!
	done: Boolean!
	totalDuration: Int
	loadDuration: Int
	promptEvalCount: Int
	promptEvalDuration: Int
	evalCount: Int
	evalDuration: Int
}

type OpenAiChatMessage {
	role: String!
	content: String!
}

input OpenAiChatMessageInput {
	role: String!
	content: String!
}

type OpenAiChatResponse {
	id: String!
	model: String!
	choices: [ChatChoice!]!
	usage: Usage
}

type Query {
	hello: String!
	ollamaGenerate(name: String!, model: String!, prompt: String!): GenerateResponse!
	ollamaChat(name: String!, model: String!, messages: [OllamaChatMessageInput!]!): OllamaChatResponse!
	openAiChat(name: String!, model: String!, messages: [OpenAiChatMessageInput!]!, maxTokens: Int): OpenAiChatResponse!
	"""
	Retrieves reports for a given user based on flexible date ranges and report types.
	
	This method only returns previously cached reports and does not generate new reports.
	If no cached report exists for a period, it will be omitted from the results.
	
	- The `customer_id` parameter specifies the customer ID whose reports to retrieve.
	- The `review_hostname` is extracted from the `kid` field of the external REview-signed JWT.
	- The `report_type` parameter is the type of reports to retrieve (DAILY, WEEKLY, or MONTHLY).
	- The `start` parameter specifies the start date (inclusive) in YYYY-MM-DD format.
	- The `end` parameter specifies the end date (exclusive) in YYYY-MM-DD format.
	- The optional `lang` parameter sets the language for the reports (defaults to English if not specified).
	
	For DAILY reports, returns a list of daily reports for each day in [start, end).
	For WEEKLY reports, returns a list of weekly reports for each week that overlaps with at least one day in [start, end).
	For MONTHLY reports, returns a list of monthly reports for each month that overlaps or falls in [start, end).
	
	If any reports are missing for the requested range, they will be omitted from the response.
	The API returns only the existing reports in the result array.
	
	# Errors
	
	Returns an error if:
	- External REview-signed JWT with `kid` is not provided
	- Input validation fails
	- Date parsing fails
	- Database operations fail
	"""
	reports(customerId: ID!, reportType: ReportType!, start: String!, end: String!, lang: Language): [ReportItem!]!
}

type ReportItem {
	"""
	The type of report (DAILY, WEEKLY, or MONTHLY)
	"""
	reportType: ReportType!
	"""
	The date or period this report covers (YYYY-MM-DD for daily, YYYY-Www for weekly, YYYY-MM for monthly)
	"""
	period: String!
	"""
	Detailed report content in Markdown format
	"""
	detail: String!
	"""
	Summary report content in Markdown format
	"""
	summary: String!
	"""
	Report generation time
	"""
	createdAt: TimestampIso8601!
}

type ReportResult {
	"""
	Detailed report content in Markdown format
	"""
	detail: String!
	"""
	Summary report content in Markdown format
	"""
	summary: String!
	"""
	Whether response is from cache
	"""
	cached: Boolean!
	"""
	Report generation time
	"""
	createdAt: TimestampIso8601!
}

enum ReportType {
	DAILY
	WEEKLY
	MONTHLY
}

scalar TimestampIso8601

type Usage {
	promptTokens: Int!
	completionTokens: Int!
	totalTokens: Int!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Provides a scalar specification URL for specifying the behavior of custom scalar types.
"""
directive @specifiedBy(url: String!) on SCALAR
schema {
	query: Query
	mutation: Mutation
}
