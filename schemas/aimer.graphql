	Observation count this exemplar stands for.
	"""
	count: Int!
	"""
	Representative phrasing (report-scope redaction tokens applied
	upstream); forwarded verbatim.
	"""
	factor: String!
}

type Mutation {
	"""
	Analyzes a security event using an LLM and returns the threat analysis.
	
	Stateless variant under `auth-mtls`: the BFF (aicers/aimer-web#44) supplies
	already-redacted events and stores results on its own side, so aimer
	persists nothing here — no cache lookup, no cache write, no in-flight dedup.
	
	PII redaction is the caller's responsibility. aimer-web is the single
	source of truth for the redaction policy and owns the per-event
	redaction map used to restore tokens in the UI; see
	aicers/aimer-web#247. Events arrive already in their final redacted
	form and are forwarded to the LLM unchanged.
	
	# Errors
	
	Returns an error if:
	- Input validation fails (empty `event` or `model`)
	- The requested LLM server `name` is not registered
	- LLM analysis fails
	"""
	analyzeEvent(event: String!, eventTime: DateTime!, name: String!, model: String!, lang: Language): AnalysisResult!
	"""
	Generates a periodic (LIVE / DAILY / WEEKLY / MONTHLY) security report
	by synthesizing
	already-analyzed story leaves, single-event leaves, and baseline
	aggregates into a narrative `sections` JSON.
	
	Stateless under `auth-mtls`: aimer stores nothing, performs no
	caching, and does not require an `auth.kid` (`review_hostname`) claim.
	`customerId` is accepted for observability and prompt context only.
	
	PII redaction is the caller's responsibility. aimer-web rewrites
	per-story / per-event redaction tokens into report-scope tokens of
	the form `<<REDACTED_*_R{j}_*>>` before calling this mutation; aimer
	forwards every string to the LLM verbatim and the prompt is
	instructed to preserve those tokens.
	
	Exactly one LLM call is issued per invocation. The response always
	includes `promptVersion` and `modelActualVersion`.
	
	# Errors
	
	Returns an error if:
	- Input validation fails (empty `customerId` / `model` / `name`,
	malformed `date`)
	- The requested LLM server `name` is not registered
	- LLM call fails (transport error, provider error envelope,
	structured-output payload missing)
	"""
	generatePeriodicSecurityReport(customerId: ID!, period: Period!, date: String!, timezone: String!, lang: Language, model: String!, name: String!, inputs: PeriodicReportInputs!): PeriodicSecurityReportResult!
	"""
	Translates an already-synthesized, tokenized English periodic security
	report into `targetLang`, returning the same 5-field `sections` shape
	`generatePeriodicSecurityReport` produces, with all narrative prose
	localized and every redaction token preserved verbatim.
	
	Stateless under `auth-mtls`: aimer stores nothing, performs no caching,
	and accepts no `force`. `customerId` is accepted for observability and
	prompt context only.
	
	The input `sections` is the JSON string `generatePeriodicSecurityReport`
	returns (executive summary, story highlights, notable events, baseline
	observations, period outlook). It is validated against that shape before
	any LLM call. Only narrative prose is translated; MITRE technique IDs and
	`<<REDACTED_*_R{j}_*>>` redaction tokens stay in native form. `targetLang`
	is limited to the `Language` enum's current variants (Korean / English);
	`targetLang: ENGLISH` on an English canonical report is a no-op
	round-trip.
	
	Exactly one LLM call is issued per invocation (no retry). Three defensive
	checks run on the response: an element-count check rejects any merge /
	split / drop / add of the array sections (including `executive_summary`,
	now an array of citation units); a per-unit `source` equality check
	rejects any citation added, dropped, or rewritten by the translator; and
	a per-corresponding-string redaction-token multiset check rejects any
	token add / drop / rewrite as well as any token moved to a different
	string or array element. A pure reorder of token-free, uncited prose is
	not separately detected; it is left to the prompt's same-order
	constraint.
	
	# Errors
	
	Returns an error if:
	- Input validation fails (empty `customerId` / `model` / `name`, or
	`sections` that does not deserialize into the canonical report shape)
	- The requested LLM server `name` is not registered
	- The LLM call fails (transport error, provider error envelope,
	structured-output payload missing or wrong-shaped)
	- The translated output changes an array element count, alters a unit's
	citation `source`, or alters the per-string redaction-token multiset
	(including a token moved between strings or array elements)
	"""
	translatePeriodicSecurityReport(customerId: ID!, sections: String!, targetLang: Language!, model: String!, name: String!): PeriodicSecurityReportResult!
	"""
	Generates a report for a given customer.
	
	- The `customer_id` parameter specifies the customer ID for which to generate the report.
	- The `review_hostname` is extracted from the `kid` field of the external REview-signed JWT.
	- The `report_type` parameter specifies the type of report to generate:
	- `DAILY`: Generates a report for the specified date.
	- `WEEKLY`, `MONTHLY`: Aggregates top threats from daily reports within the period.
	Missing daily reports are generated if possible; days with no data are skipped. At least
	one daily report must exist or be creatable for the report generation to succeed.
	- The `date` is for which to generate the report. It is in `YYYY-MM-DD` format. The date is
	interpreted as a date in the "Asia/Seoul" timezone.
	- The `name` parameter specifies the LLM provider/server to use for report generation.
	- The `model` parameter specifies the LLM model to use for report generation.
	- The `lang` parameter, if provided, sets the language for the analysis report (defaults to
	English if not specified).
	- The `force` parameter, if set to `true`, forces re-generation even if a cached result
	exists (defaults to `false` if not specified).
	
	# Errors
	
	Returns an error if:
	- External REview-signed JWT with `kid` is not provided
	- Input validation fails
	- LLM server is not found or unavailable
	- Database operations fail
	- No event analysis data exists for the requested date (`DAILY`) or for any dates in the
	target period (`WEEKLY`/`MONTHLY`)
	- LLM response parsing fails
	"""
	generateReport(customerId: ID!, name: String!, model: String!, reportType: ReportType!, date: String!, lang: Language, force: Boolean): ReportResult!
	"""
	Analyzes a multi-event security story using an LLM and returns the
	story-level threat hypothesis.
	
	Stateless under `auth-mtls`: aimer stores nothing for this mutation.
	`customerId` and `storyId` are accepted for observability and prompt
	context only — aimer performs no lookup or storage keyed by them.
	
	PII redaction is the caller's responsibility. aimer-web owns the
	per-event redaction map; `members[].event`, `enrichmentFacts[].text`,
	and `storyMetadata` strings are forwarded to the LLM unchanged.
	Redaction tokens present in the input are preserved verbatim in the
	analysis output. A real member token looks like `<<REDACTED_IP_E1_001>>`
	and a fact token like `<<REDACTED_DOMAIN_F1_001>>`; the
	`TYPE`/`NNN`/`*`/`{i}`/`{k}` in the `<<REDACTED_TYPE_E{i}_NNN>>`,
	`<<REDACTED_*_E{i}_*>>`, and `<<REDACTED_*_F{k}_*>>` shapes are
	wildcards, not literal characters. Fact tokens are opaque: aimer never
	validates or restores them.
	
	Exactly one LLM call is issued per invocation (no two-stage formatter
	pass). The response always includes `promptVersion` and
	`modelActualVersion`.
	
	# Errors
	
	Returns an error if:
	- Input validation fails (empty `members`, ordinal multiset not
	contiguous `1..N`, `memberCount` mismatch, role-frequency mismatch,
	duplicate role keys, `storyMetadata.storyId` mismatch,
	`firstSeenAt > lastSeenAt`, empty `event` / `role` / `model` /
	`name` / `enrichmentFacts[].text`)
	- The requested LLM server `name` is not registered
	- LLM analysis fails (transport error, provider error envelope,
	structured-output parse failure, factor/TTP shape violation)
	"""
	analyzeStory(customerId: ID!, storyId: ID!, members: [StoryMemberInput!]!, storyMetadata: StoryMetadataInput!, enrichmentFacts: [EnrichmentFactInput!]!, name: String!, model: String!, lang: Language): StoryAnalysisResult!
}

