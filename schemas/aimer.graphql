"""
Report period covered by `generatePeriodicSecurityReport`.

Distinct from `ReportType` (DAILY/WEEKLY/MONTHLY) which belongs to the
legacy stateful `generateReport` path. `Period` is used only by the
stateless periodic-report flow; merging the two enums would conflate the
two surfaces.
"""
enum Period {
	"""
	Rolling live window anchored to `date` in the supplied `timezone`.
	Exact window definition lives in `rfcs/0002-periodic-llm-analysis.md`.
	"""
	LIVE
	"""
	24-hour bucket covering `date` in the supplied `timezone`.
	"""
	DAILY
	"""
	7-day window anchored to `date` in the supplied `timezone`.
	Exact window definition lives in `rfcs/0002-periodic-llm-analysis.md`.
	"""
	WEEKLY
	"""
	Calendar-month window anchored to `date` in the supplied `timezone`.
	Exact window definition lives in `rfcs/0002-periodic-llm-analysis.md`.
	"""
	MONTHLY
}

"""
Typed input bundle for `generatePeriodicSecurityReport`.

All fields are pre-redacted and forwarded to the LLM verbatim. The
`aggregate_ttp_tags` field is computed by aimer-web at write time from
leaf rows and is the deduplicated sorted union of every `ttp_tags`
across the bundle.
"""
input PeriodicReportInputs {
	"""
	Story-level leaves included in this period's bundle.
	"""
	storyAnalyses: [StoryAnalysisInput!]!
	"""
	Single-event leaves included in this period's bundle.
	"""
	eventAnalyses: [EventAnalysisInput!]!
	"""
	Period-level baseline aggregates.
	"""
	baselineAggregates: BaselineAggregatesInput!
	"""
	Deduplicated sorted union of `ttp_tags` across all leaves. Computed by
	aimer-web at write time; aimer forwards it verbatim.
	"""
	aggregateTtpTags: [String!]!
	"""
	Aggregates over the auto-analyzed baseline-event remainder, feeding the
	long-tail narrative. Optional/nullable so existing aimer-web clients
	keep working until their builder lands; when absent, the prompt omits
	the narrative and the payload shape is byte-identical to before.
	"""
	analyzedEventAggregates: AnalyzedEventAggregatesInput
}

"""
Wire-shape response for `generatePeriodicSecurityReport`.

`sections` is a JSON-encoded string carrying the LLM's strict structured
output (executive summary, story highlights, notable events, baseline
observations, period outlook). String-typing is intentional — it matches
the `sections_jsonb` shape in `rfcs/0002-periodic-llm-analysis.md`, keeps
the contract stable across prompt evolutions, and avoids forcing
aimer-web consumers to migrate every time a section is added or renamed.
"""
type PeriodicSecurityReportResult {
	"""
	JSON-encoded structured-output payload (executive summary, story
	highlights, notable events, baseline observations, period outlook).
	Redaction tokens are preserved verbatim.
	"""
	sections: String!
	"""
	Identifier of the prompt template that produced this response. Bumped
	whenever `PERIODIC_SECURITY_REPORT_PROMPT` or the JSON schema changes
	shape.
	"""
	promptVersion: String!
	"""
	Provider-reported model snapshot for the call. Falls back to the
	requested `model` argument when the provider does not report one.
	"""
	modelActualVersion: String!
}

type Query {
	hello: String!
	ollamaGenerate(name: String!, model: String!, prompt: String!): GenerateResponse!
	ollamaChat(name: String!, model: String!, messages: [OllamaChatMessageInput!]!): OllamaChatResponse!
	openAiChat(name: String!, model: String!, messages: [OpenAiChatMessageInput!]!, maxTokens: Int): OpenAiChatResponse!
	"""
	Retrieves reports for a given user based on flexible date ranges and report types.
	
	This method only returns previously cached reports and does not generate new reports.
	If no cached report exists for a period, it will be omitted from the results.
	
	- The `customer_id` parameter specifies the customer ID whose reports to retrieve.
	- The `review_hostname` is extracted from the `kid` field of the external REview-signed JWT.
	- The `report_type` parameter is the type of reports to retrieve (DAILY, WEEKLY, or MONTHLY).
	- The `start` parameter specifies the start date (inclusive) in YYYY-MM-DD format.
	- The `end` parameter specifies the end date (exclusive) in YYYY-MM-DD format.
	- The optional `lang` parameter sets the language for the reports (defaults to English if not specified).
	
	For DAILY reports, returns a list of daily reports for each day in [start, end).
	For WEEKLY reports, returns a list of weekly reports for each week that overlaps with at least one day in [start, end).
	For MONTHLY reports, returns a list of monthly reports for each month that overlaps or falls in [start, end).
	
	If any reports are missing for the requested range, they will be omitted from the response.
	The API returns only the existing reports in the result array.
	
	# Errors
	
	Returns an error if:
	- External REview-signed JWT with `kid` is not provided
	- Input validation fails
	- Date parsing fails
	- Database operations fail
	"""
	reports(customerId: ID!, reportType: ReportType!, start: String!, end: String!, lang: Language): [ReportItem!]!
}

type ReportItem {
	"""
	The type of report (DAILY, WEEKLY, or MONTHLY)
	"""
	reportType: ReportType!
	"""
	The date or period this report covers (YYYY-MM-DD for daily, YYYY-Www for weekly, YYYY-MM for monthly)
	"""
	period: String!
	"""
	Detailed report content in Markdown format
	"""
	detail: String!
	"""
	Summary report content in Markdown format
	"""
	summary: String!
	"""
	Report generation time
	"""
	createdAt: TimestampIso8601!
}

type ReportResult {
	"""
	Detailed report content in Markdown format
	"""
	detail: String!
	"""
	Summary report content in Markdown format
	"""
	summary: String!
	"""
	Whether response is from cache
	"""
	cached: Boolean!
	"""
	Report generation time
	"""
	createdAt: TimestampIso8601!
}

enum ReportType {
	DAILY
	WEEKLY
	MONTHLY
}

"""
One already-analyzed story leaf included in the periodic-report bundle.

`sections` carries the leaf's `<<REDACTED_*_R{j}_*>>`-rewritten story
analysis output produced upstream by aimer-web. `severity_factors`,
`likelihood_factors`, and `ttp_tags` are the leaf factor / tag arrays
preserved verbatim for prompt-side narrative weaving.
"""
input StoryAnalysisInput {
	"""
	Story identifier (opaque, reference only).
	"""
	storyId: ID!
	"""
	Earliest member event time across the story window (UTC).
	"""
	timeRangeStart: DateTime!
	"""
	Latest member event time across the story window (UTC).
	"""
	timeRangeEnd: DateTime!
	"""
	JSON-encoded leaf story-analysis sections (report-scope redaction
	tokens applied upstream).
	"""
	sections: String!
	"""
	Leaf severity score from 0.0 to 1.0, when available.
	"""
	severityScore: Float
	"""
	Leaf likelihood score from 0.0 to 1.0, when available.
	"""
	likelihoodScore: Float
	"""
	Leaf severity factors preserved verbatim from the story analysis.
	"""
	severityFactors: [String!]!
	"""
	Leaf likelihood factors preserved verbatim from the story analysis.
	"""
	likelihoodFactors: [String!]!
	"""
	Leaf MITRE ATT&CK technique IDs preserved verbatim.
	"""
	ttpTags: [String!]!
}

"""
Wire-shape response for `analyzeStory`.

Six fields are sourced directly from the LLM JSON output (severity /
likelihood scores, factor arrays, TTP tags, analysis markdown); two
(`promptVersion`, `modelActualVersion`) are appended server-side so
downstream consumers can pin both the prompt template and the model
snapshot that produced the analysis.
"""
type StoryAnalysisResult {
	"""
	Severity score from 0.0 to 1.0 ("if real, how bad").
	"""
	severityScore: Float!
	"""
	Likelihood score from 0.0 to 1.0 ("how likely this is a real threat").
	"""
	likelihoodScore: Float!
	"""
	Short noun phrases articulating the severity score (1-5 items).
	The sentinel `["insufficient evidence"]` indicates thin input.
	"""
	severityFactors: [String!]!
	"""
	Short noun phrases articulating the likelihood score (1-5 items).
	The sentinel `["insufficient evidence"]` indicates thin input.
	"""
	likelihoodFactors: [String!]!
	"""
	MITRE ATT&CK technique IDs (e.g., `T1078`, `T1110.001`). May be empty.
	"""
	ttpTags: [String!]!
	"""
	Markdown narrative reconstructing the attacker hypothesis across the
	story. May contain redaction tokens preserved verbatim from the input,
	drawn from both `members[].event` and `enrichmentFacts[].text`. A real
	member token looks like `<<REDACTED_IP_E1_001>>` and a fact token like
	`<<REDACTED_DOMAIN_F1_001>>`; the `*`/`{i}`/`{k}` in the
	`<<REDACTED_*_E{i}_*>>` and `<<REDACTED_*_F{k}_*>>` shapes are
	wildcards, not literal characters.
	"""
	analysis: String!
	"""
	Identifier of the prompt template that produced this response. Bumped
	whenever `STORY_PROMPT` or `STORY_JSON_SCHEMA` changes shape.
	"""
	promptVersion: String!
	"""
	Provider-reported model snapshot for the call. Falls back to the
	requested `model` argument when the provider does not report one.
	"""
	modelActualVersion: String!
}

"""
One member of the story (a single event positioned at an ordinal).
"""
input StoryMemberInput {
	"""
	Ordinal that matches the `E{i}` token namespace embedded in `event`.
	Ordinals across `members` must form a contiguous `1..members.len()`
	sequence (each value appears exactly once).
	"""
	ordinal: Int!
	"""
	Role of the member in the story narrative (free-form string driven by
	aimer-web; aimer does not enumerate roles). Non-empty.
	"""
	role: String!
	"""
	Event timestamp (UTC).
	"""
	eventTime: DateTime!
	"""
	Pre-redacted event payload. May contain event-scope redaction tokens
	that aimer forwards verbatim. A real token looks like
	`<<REDACTED_IP_E1_001>>`; the `TYPE`/`NNN` in the
	`<<REDACTED_TYPE_E{i}_NNN>>` shape are wildcards, not literal characters.
	"""
	event: String!
}

"""
Story-wide context describing the window the members were drawn from.
"""
input StoryMetadataInput {
	"""
	Story ID, included for prompt context and provider-side observability.
	Must equal the top-level `storyId` mutation argument.
	"""
	storyId: ID!
	"""
	Earliest member event time across the story window (UTC).
	Must be `<= lastSeenAt`.
	"""
	firstSeenAt: DateTime!
	"""
	Latest member event time across the story window (UTC).
	Must be `>= firstSeenAt`.
	"""
	lastSeenAt: DateTime!
	"""
	Total number of members in the story. Must equal `members.len()`.
	"""
	memberCount: Int!
	"""
	Per-role member counts. Per-role frequency must match the actual
	`members[].role` distribution (not only the sum).
	"""
	roleDistribution: [StoryRoleCountInput!]!
}

"""
Per-role member count, supplied by the BFF alongside the story metadata.

Frequencies in `roleDistribution` must match the per-role frequencies of
the actual `members[*].role`; see `validate_role_distribution`.
"""
input StoryRoleCountInput {
	"""
	Non-empty role label.
	"""
	role: String!
	"""
	Number of members with this role (>= 0).
	"""
	count: Int!
}

scalar TimestampIso8601

