"""
auth-jwt is on removal track per #358; the new severity/likelihood fields are
exposed only under auth-mtls. Both LLM contract paths converge once auth-jwt
is deleted.
"""
type AnalysisResult {
	"""
	Severity score from 0.0 to 1.0 ("if real, how bad")
	"""
	severityScore: Float!
	"""
	Likelihood score from 0.0 to 1.0 ("how likely this is a real threat")
	"""
	likelihoodScore: Float!
	"""
	Short noun phrases articulating the severity score (1-5 items).
	The sentinel `["insufficient evidence"]` indicates thin input.
	"""
	severityFactors: [String!]!
	"""
	Short noun phrases articulating the likelihood score (1-5 items).
	The sentinel `["insufficient evidence"]` indicates thin input.
	"""
	likelihoodFactors: [String!]!
	"""
	MITRE ATT&CK technique IDs (e.g., `T1078`, `T1110.001`). May be empty.
	"""
	ttpTags: [String!]!
	"""
	Markdown-formatted analysis
	"""
	analysis: String!
	"""
	Identifier of the prompt template that produced this response. Bumped
	whenever `ANALYSIS_PROMPT` or `JSON_SCHEMA` changes in a way downstream
	consumers should distinguish.
	"""
	promptVersion: String!
	"""
	Provider-reported model snapshot for the formatting call. Falls back to
	the requested `model` argument when the provider does not report one.
	"""
	modelActualVersion: String!
}

"""
Aggregates over the auto-analyzed baseline events not individually cited in
the report, feeding the prompt's long-tail narrative.

`top_techniques`, `tier_distribution`, and `uncited_rollup` reuse
`BaselineCountInput`; `exemplars` carry representative phrasing. All strings
are pre-redacted by aimer-web and forwarded to the LLM verbatim.
"""
input AnalyzedEventAggregatesInput {
	"""
	Analyzed-window start (UTC, inclusive).
	"""
	windowStart: DateTime!
	"""
	Analyzed-window end (UTC, exclusive).
	"""
	windowEnd: DateTime!
	"""
	Total count of auto-analyzed events in the window.
	"""
	analyzedCount: Int!
	"""
	Count of analyzed events individually cited elsewhere in the report.
	"""
	citedCount: Int!
	"""
	Dominant techniques across the analyzed remainder (MITRE technique IDs).
	"""
	topTechniques: [BaselineCountInput!]!
	"""
	Severity-tier makeup of the analyzed remainder.
	"""
	tierDistribution: [BaselineCountInput!]!
	"""
	Technique rollup over the uncited analyzed remainder.
	"""
	uncitedRollup: [BaselineCountInput!]!
	"""
	Representative exemplars drawn from the uncited analyzed remainder.
	"""
	exemplars: [LongTailExemplarInput!]!
}

"""
Period-level baseline aggregates supplied by aimer-web.
"""
input BaselineAggregatesInput {
	"""
	Baseline window start (UTC, inclusive).
	"""
	windowStart: DateTime!
	"""
	Baseline window end (UTC, exclusive).
	"""
	windowEnd: DateTime!
	"""
	Period-level totals.
	"""
	totals: BaselineTotalsInput!
	"""
	Top techniques observed in the window (MITRE technique IDs).
	"""
	topTechniques: [BaselineCountInput!]!
	"""
	Top sensors observed in the window.
	"""
	topSensors: [BaselineCountInput!]!
}

"""
A `(key, count)` pair used by `top_techniques` / `top_sensors`.
"""
input BaselineCountInput {
	"""
	Identifier (MITRE technique ID for `top_techniques`, sensor name for
	`top_sensors`).
	"""
	key: String!
	"""
	Observation count for the key.
	"""
	count: Int!
}

"""
Period-level baseline counts.
"""
input BaselineTotalsInput {
	"""
	Total event count covered by the baseline window.
	"""
	events: Int!
	"""
	Total story count covered by the baseline window.
	"""
	stories: Int!
	"""
	Distinct host count covered by the baseline window.
	"""
	hosts: Int!
}

