"""
One representative phrasing drawn from the uncited analyzed remainder.

Used by the long-tail narrative to ground its characterization in concrete
examples without citing individual leaves. `factor` carries report-scope
redacted token text (`<<REDACTED_*_R{j}_*>>`) already redacted by aimer-web
and is forwarded to the LLM verbatim.
"""
input LongTailExemplarInput {
